<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Docker | Nguyen Tra Duy Dat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #818cf8;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f1f5f9;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 70, 229, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.15) 0px, transparent 50%);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 600px;
            padding: 2rem;
            z-index: 10;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 20px;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 800;
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.welcome {
            font-size: 1.1rem;
            color: #94a3b8;
            margin-bottom: 2rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .badge {
            display: inline-block;
            padding: 0.5rem 1rem;
            background: rgba(79, 70, 229, 0.1);
            border: 1px solid rgba(79, 70, 229, 0.2);
            color: var(--secondary);
            border-radius: 100px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-top: 1rem;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.875rem;
            color: #475569;
        }

        .btn-play {
            display: inline-block;
            padding: 1rem 2rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(79, 70, 229, 0.5);
            filter: brightness(1.1);
        }

        /* Particles Background */
        .decor-1 {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
        }

        .decor-2 {
            position: absolute;
            bottom: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            background: var(--secondary);
            filter: blur(150px);
            opacity: 0.2;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="decor-1"></div>
    <div class="decor-2"></div>

    <div class="container">
        <div class="glass-card">
            <div class="logo-container">D</div>
            <p class="welcome">Welcome to Project</p>
            <h1>Nguyen Tra Duy Dat</h1>
            <div class="badge">Spring Boot + Docker + Thymeleaf</div>
            
            <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                <a href="/game" class="btn-play">🐍 Rắn Săn Mồi</a>
                <a href="/watermelon" class="btn-play" style="background: linear-gradient(135deg, #f43f5e, #fb7185); box-shadow: 0 10px 15px -3px rgba(244, 63, 94, 0.4);">🍉 Watermelon Drop</a>
                <a href="/stickman" class="btn-play" style="background: linear-gradient(135deg, #475569, #1e293b); box-shadow: 0 10px 15px -3px rgba(71, 85, 105, 0.4);">⚔️ Stickman Battle</a>
                <a href="/goalkeeper" class="btn-play" style="background: linear-gradient(135deg, #22c55e, #10b981); box-shadow: 0 10px 15px -3px rgba(34, 197, 94, 0.4);">🧤 Thủ Môn Siêu Cấp</a>
            </div>

            <div class="footer">
                Running gracefully on Port 8080
            </div>
        </div>
    </div>
</body>
</html>

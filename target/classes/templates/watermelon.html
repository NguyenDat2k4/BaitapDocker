<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watermelon Drop | Realistic Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <style>
        :root {
            --bg: #0f172a;
            --panel: rgba(30, 41, 59, 0.7);
            --accent: #f43f5e;
            --text: #f1f5f9;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(244, 63, 94, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(79, 70, 229, 0.1) 0%, transparent 40%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            display: flex;
            gap: 2rem;
            padding: 2rem;
            border-radius: 24px;
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            min-width: 200px;
        }

        .stat-card {
            background: rgba(15, 23, 42, 0.5);
            padding: 1.5rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            text-align: center;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        #game-canvas-wrapper {
            position: relative;
            width: 450px;
            height: 700px;
            border-radius: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 4px solid var(--glass-border);
            overflow: hidden;
        }

        .next-preview {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #next-fruit-img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            border-radius: 50%;
            transition: transform 0.3s;
        }

        .evolution-list {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }

        .evo-item {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            object-fit: contain;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.5s;
        }

        .overlay.visible { opacity: 1; pointer-events: all; }

        .btn {
            padding: 1rem 2rem; background: #4f46e5; color: white; border: none;
            border-radius: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
            text-decoration: none; display: block; text-align: center; margin-top: 1rem;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(79, 70, 229, 0.4); }

        #line {
            position: absolute; top: 100px; left: 0; width: 100%; height: 2px;
            background: repeating-linear-gradient(90deg, #f43f5e, #f43f5e 10px, transparent 10px, transparent 20px);
            opacity: 0.4;
        }
        
        #loading-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            z-index: 1000; flex-direction: column; gap: 1rem; transition: opacity 0.5s;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="stat-value" style="font-size: 1.5rem;">Đang tải trái cây...</div>
        <div style="width: 200px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;">
            <div id="loading-bar" style="width: 0%; height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s;"></div>
        </div>
    </div>

    <div id="game-container">
        <div class="side-panel">
            <div class="stat-card">
                <div class="stat-label">Tiếp theo</div>
                <div class="next-preview">
                    <img id="next-fruit-img" src="" alt="Next">
                </div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Điểm số</div>
                <div id="score" class="stat-value">0</div>
            </div>

            <div class="stat-card">
                <div class="stat-label">Tiến hóa</div>
                <div class="evolution-list" id="evo-list"></div>
            </div>
            
            <a href="/game" class="btn" style="background: #22c55e">Chơi Snake</a>
            <a href="/" class="btn" style="background: rgba(255,255,255,0.05)">Thoát</a>
        </div>

        <div id="game-canvas-wrapper">
            <div id="line"></div>
            <div id="game-over-overlay" class="overlay">
                <h2 style="font-size: 3rem; margin-bottom: 2rem;">HẾT GIỜ!</h2>
                <div id="final-score" class="stat-value" style="margin-bottom: 2rem;">0</div>
                <button class="btn" onclick="location.reload()">Chơi Lại</button>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        const { Engine, Render, Runner, World, Bodies, Body, Events, Composite } = Matter;

        const CONFIG = [
            { name: 'Cherry', radius: 18, img: '/images/fruits/cherry.png', score: 1 },
            { name: 'Strawberry', radius: 26, img: '/images/fruits/strawberry.png', score: 2 },
            { name: 'Grape', radius: 36, img: '/images/fruits/grape.png', score: 4 },
            { name: 'Orange', radius: 48, img: '/images/fruits/orange.png', score: 8 },
            { name: 'Persimmon', radius: 62, img: '/images/fruits/persimmon.png', score: 16 },
            { name: 'Apple', radius: 80, img: '/images/fruits/apple.png', score: 32 },
            { name: 'Pear', radius: 100, img: '/images/fruits/pear.png', score: 64 },
            { name: 'Peach', radius: 122, img: '/images/fruits/peach.png', score: 128 },
            { name: 'Pineapple', radius: 145, img: '/images/fruits/pineapple.png', score: 256 },
            { name: 'Melon', radius: 172, img: '/images/fruits/melon.png', score: 512 },
            { name: 'Watermelon', radius: 210, img: '/images/fruits/watermelon.png', score: 1024 }
        ];

        let engine, render, runner, currentFruit;
        let score = 0, nextIdx = 0, isGameOver = false, isSpawning = false;
        const container = document.getElementById('game-canvas-wrapper');
        const width = 450, height = 700, limitY = 100;

        const processedImages = {};

        async function preProcessImages() {
            let loaded = 0;
            const loadingBar = document.getElementById('loading-bar');
            
            const promises = CONFIG.map(fruit => {
                return new Promise((resolve) => {
                    const img = new Image();
                    img.src = fruit.img;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.width;
                        canvas.height = img.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0);
                        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                        const data = imageData.data;
                        
                        // Remove white background (near white pixels)
                        for (let i = 0; i < data.length; i += 4) {
                            const r = data[i], g = data[i+1], b = data[i+2];
                            if (r > 240 && g > 240 && b > 240) {
                                data[i+3] = 0;
                            }
                        }
                        ctx.putImageData(imageData, 0, 0);
                        processedImages[fruit.img] = canvas.toDataURL();
                        
                        loaded++;
                        loadingBar.style.width = `${(loaded / CONFIG.length) * 100}%`;
                        resolve();
                    };
                    img.onerror = () => {
                        processedImages[fruit.img] = fruit.img;
                        loaded++;
                        resolve();
                    }
                });
            });
            await Promise.all(promises);
            document.getElementById('loading-screen').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-screen').style.display = 'none', 500);
        }

        async function init() {
            await preProcessImages();
            
            engine = Engine.create({ gravity: { y: 1.2 } });
            render = Render.create({
                element: container, engine: engine,
                options: { width, height, wireframes: false, background: 'transparent' }
            });

            const ground = Bodies.rectangle(width/2, height+25, width, 50, { isStatic: true, render: { visible: false } });
            const lWall = Bodies.rectangle(-25, height/2, 50, height, { isStatic: true, render: { visible: false } });
            const rWall = Bodies.rectangle(width+25, height/2, 50, height, { isStatic: true, render: { visible: false } });
            
            World.add(engine.world, [ground, lWall, rWall]);
            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            initUI(); prepareNext(); spawnGhost();

            document.addEventListener('mousemove', e => {
                if (!currentFruit || isSpawning || isGameOver) return;
                const rect = container.getBoundingClientRect();
                const x = Math.max(currentFruit.circleRadius + 10, Math.min(width - currentFruit.circleRadius - 10, e.clientX - rect.left));
                Body.setPosition(currentFruit, { x, y: 50 });
            });

            container.addEventListener('click', () => { if (currentFruit && !isSpawning && !isGameOver) drop(); });

            Events.on(engine, 'collisionStart', (e) => {
                e.pairs.forEach(p => {
                    const { bodyA: a, bodyB: b } = p;
                    if (a.fIdx !== undefined && a.fIdx === b.fIdx && a.fIdx < CONFIG.length -1) merge(a, b);
                });
            });

            Events.on(engine, 'afterUpdate', () => {
                if (isGameOver) return;
                Composite.allBodies(engine.world).forEach(b => {
                    if (!b.isStatic && !b.isGhost && Date.now() - b.spawnTime > 1500 && b.position.y - b.circleRadius < limitY) endGame();
                });
            });
        }

        function initUI() {
            const list = document.getElementById('evo-list');
            CONFIG.forEach(f => {
                const img = document.createElement('img');
                img.src = processedImages[f.img]; img.className = 'evo-item'; img.title = f.name;
                list.appendChild(img);
            });
        }

        function prepareNext() {
            nextIdx = Math.floor(Math.random() * 5);
            document.getElementById('next-fruit-img').src = processedImages[CONFIG[nextIdx].img];
        }

        function spawnGhost() {
            const f = CONFIG[nextIdx];
            const texture = processedImages[f.img];
            currentFruit = Bodies.circle(width/2, 50, f.radius, {
                isStatic: true, isGhost: true, fIdx: nextIdx,
                collisionFilter: { group: -1 },
                render: { sprite: { texture: texture, xScale: (f.radius*2.1)/512, yScale: (f.radius*2.1)/512 }, opacity: 0.6 }
            });
            World.add(engine.world, currentFruit);
        }

        function drop() {
            isSpawning = true;
            const f = CONFIG[currentFruit.fIdx];
            const texture = processedImages[f.img];
            const b = Bodies.circle(currentFruit.position.x, currentFruit.position.y, f.radius, {
                restitution: 0.2, friction: 0.1, fIdx: currentFruit.fIdx, spawnTime: Date.now(),
                render: { sprite: { texture: texture, xScale: (f.radius*2.1)/512, yScale: (f.radius*2.1)/512 } }
            });
            World.remove(engine.world, currentFruit);
            World.add(engine.world, b);
            currentFruit = null;
            setTimeout(() => { if (!isGameOver) { prepareNext(); spawnGhost(); isSpawning = false; } }, 600);
        }

        function merge(a, b) {
            const idx = a.fIdx + 1, x = (a.position.x + b.position.x)/2, y = (a.position.y + b.position.y)/2;
            score += CONFIG[a.fIdx].score * 2; document.getElementById('score').innerText = score;
            World.remove(engine.world, [a, b]);
            const f = CONFIG[idx];
            const texture = processedImages[f.img];
            const m = Bodies.circle(x, y, f.radius, {
                restitution: 0.2, friction: 0.1, fIdx: idx, spawnTime: Date.now(),
                render: { sprite: { texture: texture, xScale: (f.radius*2.1)/512, yScale: (f.radius*2.1)/512 } }
            });
            World.add(engine.world, m);
        }

        function endGame() {
            isGameOver = true; document.getElementById('final-score').innerText = score;
            document.getElementById('game-over-overlay').classList.add('visible');
        }

        init();
    </script>
</body>
</html>
